<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>数学ラボ × 19ch 学習スタジオ（デモ）</title>
<style>
  :root{
    --bg:#0f1226; --panel:#1a1f3a; --panel2:#232a4d; --line:rgba(255,255,255,.12);
    --txt:#eef1ff; --sub:rgba(238,241,255,.6); --accent:#5e7bff; --green:#22c55e;
    --red:#f87171; --blue:#60a5fa; --yellow:#fbbf24;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1b2150,#0f1226 60%);
    color:var(--txt); display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  header{padding:8px 12px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .logo{font-weight:900; font-size:15px; letter-spacing:.3px}
  .logo small{font-weight:700; color:var(--sub); font-size:11px; margin-left:6px}
  .demo-badge{font-size:10px; font-weight:800; color:#3a2a00; background:var(--yellow); padding:2px 8px; border-radius:999px}
  .toolbar{display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:7px 12px; border-bottom:1px solid var(--line); background:rgba(0,0,0,.15)}
  .group{display:flex; align-items:center; gap:4px; padding:3px; background:var(--panel); border:1px solid var(--line); border-radius:12px}
  .group .lbl{font-size:10px; color:var(--sub); padding:0 6px; font-weight:800}
  button.btn{
    appearance:none; border:1px solid var(--line); background:var(--panel2); color:var(--txt);
    font-family:inherit; font-weight:800; font-size:12px; padding:7px 11px; border-radius:9px; cursor:pointer; line-height:1;
  }
  button.btn:hover{filter:brightness(1.15)}
  button.btn.on{background:linear-gradient(135deg,var(--accent),#7c93ff); border-color:transparent; color:#fff; box-shadow:0 3px 12px rgba(94,123,255,.4)}
  .swatch{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);cursor:pointer;padding:0}
  .swatch.on{border-color:#fff; transform:scale(1.08)}
  .stage{flex:1; position:relative; padding:10px; overflow:hidden}
  .grid{display:grid; gap:10px; height:100%}
  .grid.vert{grid-template-rows:1fr 1fr}
  .grid.horiz{grid-template-columns:1fr 1fr}
  .grid.videoOnly{grid-template-columns:1fr; grid-template-rows:1fr}
  .grid.pdfOnly{grid-template-columns:1fr; grid-template-rows:1fr}
  .cell{position:relative; background:#000; border:1px solid var(--line); border-radius:14px; overflow:hidden; min-height:0; min-width:0}
  .cell .tag{position:absolute; top:8px; left:8px; z-index:3; font-size:10px; font-weight:800; color:#fff; background:rgba(0,0,0,.55); padding:3px 8px; border-radius:999px; pointer-events:none}
  .cell iframe{width:100%; height:100%; border:0; display:block; background:#fff}
  .cell.hide{display:none}
  /* 手書きキャンバスは全面を覆うオーバーレイ。書くモードのときだけ操作を奪う */
  #board{position:absolute; inset:10px; z-index:5; border-radius:14px; touch-action:none}
  #board.draw{pointer-events:auto; cursor:crosshair}
  #board.move{pointer-events:none}
  .hint{position:absolute; bottom:8px; right:14px; z-index:6; font-size:11px; color:var(--sub); background:rgba(0,0,0,.4); padding:4px 9px; border-radius:999px; pointer-events:none}
  footer{padding:7px 12px; border-top:1px solid var(--line); font-size:10.5px; color:var(--sub); line-height:1.5}
  footer b{color:var(--txt)}
  a{color:var(--blue)}
  select{font-family:inherit; font-weight:800; font-size:12px; background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:9px; padding:6px 8px}
  @media (max-width:640px){
    .logo small{display:none}
    .toolbar{gap:5px}
  }
</style>
</head>
<body>
  <header>
    <div class="logo">📐 数学ラボ × 19ch 学習スタジオ <small>とある男が授業をしてみた／葉一 さん</small></div>
    <span class="demo-badge">DEMO（許可確認用）</span>
    <div style="flex:1"></div>
    <select id="lesson">
      <option value="0">中1-1 正の数・負の数①</option>
      <option value="1">中1-2 正の数・負の数②</option>
    </select>
  </header>

  <div class="toolbar">
    <div class="group">
      <span class="lbl">表示</span>
      <button class="btn" data-content="both">動画＋プリント</button>
      <button class="btn" data-content="video">動画のみ</button>
      <button class="btn" data-content="pdf">プリントのみ</button>
    </div>
    <div class="group">
      <span class="lbl">ならべ方</span>
      <button class="btn" data-layout="vert">⬍ 縦</button>
      <button class="btn" data-layout="horiz">⬌ 横</button>
    </div>
    <div class="group">
      <span class="lbl">モード</span>
      <button class="btn" id="modeMove">👆 操作</button>
      <button class="btn" id="modeDraw">✏️ 書く</button>
    </div>
    <div class="group" id="penTools">
      <span class="lbl">ペン</span>
      <button class="swatch" style="background:#111" data-color="#111111"></button>
      <button class="swatch" style="background:#ef4444" data-color="#ef4444"></button>
      <button class="swatch" style="background:#3b82f6" data-color="#3b82f6"></button>
      <button class="btn" data-size="3">細</button>
      <button class="btn" data-size="6">中</button>
      <button class="btn" data-size="12">太</button>
      <button class="btn" id="eraser">消しゴム</button>
      <button class="btn" id="clear">全消し</button>
    </div>
  </div>

  <div class="stage">
    <div class="grid" id="grid">
      <div class="cell" id="cellVideo"><span class="tag">▶ 解説動画（YouTube）</span>
        <iframe id="ytFrame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
      <div class="cell" id="cellPdf">
        <span class="tag">📄 無料プリント（19ch・読み込み式）</span>
        <a id="pdfOpen" class="tag" style="left:auto; right:8px; pointer-events:auto; text-decoration:none" target="_blank" rel="noopener">↗ 別タブで開く</a>
        <iframe id="pdfFrame"></iframe>
      </div>
    </div>
    <canvas id="board" class="move"></canvas>
    <div class="hint" id="hint">「✏️書く」で上から手書き／「👆操作」で動画・PDFを操作</div>
  </div>

  <footer>
    ※ これは機能サンプルです。動画は <b>YouTube公式埋め込み</b>（再生・広告は葉一さんのチャンネルに計上）、プリントは <b>19ch のPDFを読み込み表示</b>（再ホストせず）。
    コンテンツの著作権は <b>葉一「とある男が授業をしてみた」</b>／プリント出典 <a href="https://19ch.tv/" target="_blank" rel="noopener">19ch.tv</a> に帰属します。公開前に許可をいただく前提のデモです。
  </footer>

<script>
  // ===== レッスンデータ（正の数・負の数）=====
  const LESSONS = [
    { yt:"n5ozHyyPYeE", pdf:"https://19ch.tv/c1/c1m/c1text/ma/c1m1.pdf", title:"正の数・負の数①" },
    { yt:"YxKqGOOd_34", pdf:"https://19ch.tv/c1/c1m/c1text/ma/c1m2.pdf", title:"正の数・負の数②" },
  ];
  let cur = 0, layout = "vert", content = "both";

  const grid = document.getElementById("grid");
  const cellVideo = document.getElementById("cellVideo");
  const cellPdf = document.getElementById("cellPdf");
  const ytFrame = document.getElementById("ytFrame");
  const pdfFrame = document.getElementById("pdfFrame");

  function loadLesson(i){
    cur = i;
    const L = LESSONS[i];
    ytFrame.src = `https://www.youtube-nocookie.com/embed/${L.yt}?rel=0&modestbranding=1`;
    // 19chのPDFを直接読み込み表示（再ホストせず）。framingは許可されている。
    pdfFrame.src = L.pdf;
    document.getElementById("pdfOpen").href = L.pdf;
  }
  function applyView(){
    grid.className = "grid " + (content==="both" ? layout : (content==="video"?"videoOnly":"pdfOnly"));
    cellVideo.classList.toggle("hide", content==="pdf");
    cellPdf.classList.toggle("hide", content==="video");
    // レイアウト変更後にキャンバスをはり直す
    requestAnimationFrame(resizeBoard);
  }

  // ===== ツールバー =====
  document.querySelectorAll('[data-content]').forEach(b=>b.onclick=()=>{
    content=b.dataset.content; setActive('[data-content]',b); applyView();
  });
  document.querySelectorAll('[data-layout]').forEach(b=>b.onclick=()=>{
    layout=b.dataset.layout; setActive('[data-layout]',b); applyView();
  });
  document.getElementById("lesson").onchange=(e)=>loadLesson(+e.target.value);
  function setActive(sel,el){document.querySelectorAll(sel).forEach(x=>x.classList.remove("on")); el.classList.add("on");}

  // ===== 手書きキャンバス =====
  const board = document.getElementById("board");
  const ctx = board.getContext("2d");
  let drawing=false, mode="move", color="#111111", size=6, erasing=false, last=null;
  const strokes = []; // [{color,size,erasing,points:[{x,y}]}]

  function resizeBoard(){
    const r = board.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    board.width = Math.max(1, Math.round(r.width*dpr));
    board.height = Math.max(1, Math.round(r.height*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    redraw();
  }
  function redraw(){
    ctx.clearRect(0,0,board.width,board.height);
    for(const s of strokes) drawStroke(s);
  }
  function drawStroke(s){
    if(s.points.length<1) return;
    ctx.save();
    ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.globalCompositeOperation = s.erasing ? "destination-out" : "source-over";
    ctx.strokeStyle = s.color; ctx.lineWidth = s.erasing ? s.size*3 : s.size;
    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for(let i=1;i<s.points.length;i++) ctx.lineTo(s.points[i].x, s.points[i].y);
    if(s.points.length===1){ ctx.lineTo(s.points[0].x+0.1, s.points[0].y+0.1); }
    ctx.stroke();
    ctx.restore();
  }
  function pos(e){
    const r = board.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x:t.clientX-r.left, y:t.clientY-r.top };
  }
  function start(e){ if(mode!=="draw")return; drawing=true; const p=pos(e); const s={color,size,erasing,points:[p]}; strokes.push(s); last=s; e.preventDefault(); }
  function move(e){ if(!drawing||mode!=="draw")return; last.points.push(pos(e)); redraw(); e.preventDefault(); }
  function end(){ drawing=false; }
  board.addEventListener("mousedown",start); board.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
  board.addEventListener("touchstart",start,{passive:false}); board.addEventListener("touchmove",move,{passive:false}); window.addEventListener("touchend",end);
  window.addEventListener("resize",resizeBoard);

  function setMode(m){
    mode=m;
    board.classList.toggle("draw", m==="draw");
    board.classList.toggle("move", m==="move");
    document.getElementById("modeDraw").classList.toggle("on", m==="draw");
    document.getElementById("modeMove").classList.toggle("on", m==="move");
    document.getElementById("hint").textContent = m==="draw"
      ? "✏️書くモード：プリントや動画の上に手書きできます（操作したいときは👆操作へ）"
      : "👆操作モード：動画の再生・PDFのスクロールができます（書くときは✏️書くへ）";
  }
  document.getElementById("modeDraw").onclick=()=>setMode("draw");
  document.getElementById("modeMove").onclick=()=>setMode("move");
  document.querySelectorAll('.swatch').forEach(b=>b.onclick=()=>{ color=b.dataset.color; erasing=false; setActive('.swatch',b); if(mode!=="draw")setMode("draw"); });
  document.querySelectorAll('[data-size]').forEach(b=>b.onclick=()=>{ size=+b.dataset.size; setActive('[data-size]',b); });
  document.getElementById("eraser").onclick=(e)=>{ erasing=true; if(mode!=="draw")setMode("draw"); };
  document.getElementById("clear").onclick=()=>{ strokes.length=0; redraw(); };

  // 初期化
  document.querySelector('[data-content="both"]').classList.add("on");
  document.querySelector('[data-layout="vert"]').classList.add("on");
  document.querySelector('.swatch[data-color="#111111"]').classList.add("on");
  document.querySelector('[data-size="6"]').classList.add("on");
  setMode("move");
  loadLesson(0);
  applyView();
</script>
</body>
</html>
